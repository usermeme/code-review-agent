name: Publish Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [gateway, agent-context-builder, agent-code-reviewer]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            APP_NAME=${{ matrix.app }}
          tags: |
            ghcr.io/${{ github.repository }}-${{ matrix.app }}:latest
            ghcr.io/${{ github.repository }}-${{ matrix.app }}:${{ github.sha }}
