      #   with:
      #     workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
      #     service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
      #
      # - name: Deploy Gateway to Cloud Run
      #   uses: google-github-actions/deploy-cloudrun@v2
      #   with:
      #     service: gateway-service
      #     image: ghcr.io/${{ github.repository }}-gateway:${{ github.sha }}
      #     region: us-central1

  deploy-agents:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Needed for Google Cloud Workload Identity Federation
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          
      - run: npm ci
      
      # Build the monorepo workspace to compile the TS to JS
      - run: npm run build

